globals:
  version: 0.4
variables:
  version: 0.4
  global_cycle_seconds: 1.0e-09
architecture:
  version: 0.4
  nodes:
  - !Container
    name: system
    attributes:
      technology: "45nm"
  - !Component
    name: DRAM
    class: DRAM
    attributes:
      width: 256
      datawidth: 8
      depth: 268435456
  - !Component
    name: GlobalBuffer
    class: SRAM
    attributes:
      depth: 16384
      width: 256
      datawidth: 8
  - !Component
    name: SobolBank
    class: storage
    subclass: sobol_bank
    attributes:
      instances: 1
      depth: 1
      width: 8
      datawidth: 8
    constraints:
      dataspace:
        bypass: [Inputs, Weights, Outputs]
  - !Component
    name: Peripheral
    class: storage
    subclass: peripheral
    attributes:
      depth: 64
      width: 8
      datawidth: 8
    constraints:
      dataspace:
        keep: [Inputs, Weights]
        bypass: [Outputs]
  - !Container
    name: PE
    spatial:
      meshX: 4
      meshY: 4
  - !Container
    name: Klane
    spatial:
      meshX: 4
  - !Component
    name: MACC
    class: sc_mac_inner
    attributes:
      mag_bits: 7
      datawidth: 8
      stream_length: 128
