globals:
  version: 0.4
variables:
  version: 0.4
  global_cycle_seconds: 1.0e-09
architecture:
  version: 0.4
  nodes:
  - !Container
    name: system
    attributes:
      technology: "22nm"
  - !Component
    name: DRAM
    class: DRAM
    attributes:
      width: 256
      datawidth: 8
      depth: 268435456
  - !Component
    name: GlobalBuffer
    class: SRAM
    attributes:
      depth: 2048
      width: 1024
      datawidth: 8
      n_banks: 1
      n_rdwr_ports: 1
      read_bandwidth: 128
      write_bandwidth: 128
  - !Component
    name: SobolBank
    class: storage
    subclass: sobol_bank
    attributes:
      instances: 1
      depth: 1
      width: 8
      datawidth: 8
    constraints:
      dataspace:
        bypass: [Inputs, Weights, Outputs]
  - !Component
    name: Peripheral
    class: storage
    subclass: peripheral
    attributes:
      depth: 128
      width: 8
      datawidth: 8
    constraints:
      dataspace:
        keep: [Inputs, Weights]
        bypass: [Outputs]
  - !Container
    name: PE
    spatial:
      meshX: 8
      meshY: 8
  - !Container
    name: Klane
    spatial:
      meshX: 8
  - !Component
    name: MACC
    class: sc_mac_inner
    attributes:
      mag_bits: 7
      datawidth: 8
      stream_length: 128
