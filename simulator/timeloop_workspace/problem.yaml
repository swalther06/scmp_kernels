problem:
  version: 0.4
  shape:
    name: GEMM
    dimensions: [M, K, N]
    data_spaces:
    - name: Inputs
      projection:
      - [[M]]
      - [[K]]
    - name: Weights
      projection:
      - [[K]]
      - [[N]]
    - name: Outputs
      projection:
      - [[M]]
      - [[N]]
      read_write: true
  instance:
    M: 4096
    K: 72
    N: 256
